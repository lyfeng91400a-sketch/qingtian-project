<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仪表盘 · 晴天</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #4F46E5; --primary-light: #EEF2FF; --success: #059669; --warning: #D97706; --danger: #DC2626;
  --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB; --gray-300: #D1D5DB;
  --gray-400: #9CA3AF; --gray-500: #6B7280; --gray-600: #4B5563; --gray-700: #374151;
  --gray-800: #1F2937; --gray-900: #111827;
  --radius: 8px; --radius-lg: 12px; --sidebar-w: 220px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--gray-50); color: var(--gray-800); line-height: 1.6; display: flex; min-height: 100vh; }
a { color: var(--primary); text-decoration: none; }

/* Sidebar */
.sidebar { width: var(--sidebar-w); background: #fff; border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
.sidebar-brand { padding: 20px 20px 16px; font-size: 20px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--gray-100); }
.sidebar-brand .icon { width: 32px; height: 32px; background: var(--primary); color: #fff; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 16px; }
.sidebar-nav { flex: 1; padding: 12px 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); font-size: 14px; color: var(--gray-600); cursor: pointer; border: none; background: none; width: 100%; text-align: left; text-decoration: none; transition: all 0.15s; }
.nav-item:hover { background: var(--gray-50); color: var(--gray-900); }
.nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
.nav-item .badge { margin-left: auto; background: var(--primary); color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
.sidebar-footer { padding: 12px; border-top: 1px solid var(--gray-100); }
.user-info { display: flex; align-items: center; gap: 10px; padding: 8px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
.user-name { font-size: 14px; font-weight: 500; }
.user-role { font-size: 12px; color: var(--gray-400); }
.btn-logout { font-size: 11px; color: var(--gray-400); border: none; background: none; cursor: pointer; }
.btn-logout:hover { color: var(--danger); }

/* Main */
.main { margin-left: var(--sidebar-w); flex: 1; padding: 24px 32px; }
.page-header { margin-bottom: 24px; }
.page-header h2 { font-size: 24px; font-weight: 700; }
.page-header p { color: var(--gray-500); font-size: 14px; margin-top: 4px; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card { background: #fff; border-radius: var(--radius-lg); padding: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid var(--gray-100); }
.stat-card .stat-icon { width: 40px; height: 40px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 12px; }
.stat-card .stat-value { font-size: 28px; font-weight: 700; }
.stat-card .stat-label { font-size: 13px; color: var(--gray-500); margin-top: 2px; }
.stat-change { font-size: 12px; margin-top: 6px; }
.stat-change.up { color: var(--success); }

/* Cards */
.dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.card { background: #fff; border-radius: var(--radius-lg); box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid var(--gray-100); }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
.card-header h3 { font-size: 16px; font-weight: 600; }
.card-body { padding: 16px 20px; }

/* Task rows */
.task-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--gray-50); cursor: pointer; text-decoration: none; color: inherit; }
.task-row:last-child { border-bottom: none; }
.task-row:hover { background: var(--gray-50); margin: 0 -20px; padding: 10px 20px; border-radius: var(--radius); }
.task-check { width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--gray-300); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
.task-check:hover { border-color: var(--primary); }
.task-check.done { background: var(--success); border-color: var(--success); color: #fff; }
.task-check.in_progress { background: var(--warning); border-color: var(--warning); color: #fff; }
.task-check.todo { background: var(--gray-100); border-color: var(--gray-300); }
.task-row .task-info { flex: 1; min-width: 0; }
.task-row .task-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-row .task-meta { font-size: 12px; color: var(--gray-400); }
.priority-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
.priority-high { background: #FEE2E2; color: var(--danger); }
.priority-medium { background: #FEF3C7; color: var(--warning); }
.priority-low { background: #D1FAE5; color: var(--success); }
.progress-bar { height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 3px; }

.btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; border: 1px solid var(--gray-300); background: #fff; color: var(--gray-700); cursor: pointer; text-decoration: none; transition: all 0.2s; }
.btn:hover { background: var(--gray-50); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: #4338CA; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-link { border: none; background: none; color: var(--primary); padding: 4px 0; font-size: 13px; }
.btn-link:hover { background: none; text-decoration: underline; }

.empty-state { text-align: center; padding: 20px; color: var(--gray-400); font-size: 14px; }

@media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .dashboard-grid { grid-template-columns: 1fr; } }
@media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .stats-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <a href="dashboard.html" class="sidebar-brand" style="text-decoration:none;color:var(--primary);">
    <div class="icon">☀️</div>晴天
  </a>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item active">📊 仪表盘</a>
    <a href="projects.html" class="nav-item">📁 项目 <span class="badge" id="proj-badge">0</span></a>
    <span class="nav-item" onclick="alert('原型占位：团队管理')">👥 团队</span>
    <span class="nav-item" onclick="alert('原型占位：日历视图')">📅 日历</span>
    <span class="nav-item" onclick="alert('原型占位：报表页面')">📈 报表</span>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="avatar" id="sidebar-avatar">?</div>
      <div>
        <div class="user-name" id="sidebar-name">加载中...</div>
        <div class="user-role">产品负责人</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()" style="margin:8px 0 0 8px;">退出登录</button>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="page-header">
    <h2 id="greeting">👋 欢迎回来</h2>
    <p>今天是 <span id="today"></span> · 你有 <span id="urgent-count">0</span> 个任务即将到期</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon" style="background:#EEF2FF; color:var(--primary);">📁</div>
      <div class="stat-value" id="stat-projects">0</div>
      <div class="stat-label">活跃项目</div>
      <div class="stat-change up" id="stat-projects-change">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#D1FAE5; color:var(--success);">✅</div>
      <div class="stat-value" id="stat-done">0</div>
      <div class="stat-label">已完成任务</div>
      <div class="stat-change up" id="stat-done-change">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#FEF3C7; color:var(--warning);">⏳</div>
      <div class="stat-value" id="stat-progress">0</div>
      <div class="stat-label">进行中</div>
      <div class="stat-change" id="stat-progress-change" style="color:var(--warning);">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#FEE2E2; color:var(--danger);">🏃</div>
      <div class="stat-value" id="stat-todo">0</div>
      <div class="stat-label">待处理</div>
      <div class="stat-change" id="stat-todo-change" style="color:var(--gray-400);">—</div>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="card">
      <div class="card-header"><h3>📌 我的待办</h3><button class="btn btn-sm" id="toggle-tasks-btn" onclick="toggleAllTasks()">查看全部</button></div>
      <div class="card-body" id="my-tasks"></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>🚀 最近项目</h3><a href="projects.html" class="btn btn-sm">查看全部 →</a></div>
      <div class="card-body" id="recent-projects"></div>
    </div>
  </div>
</main>

<script src="data.js"></script>
<script>
// ===== 初始化 =====
const user = requireLogin();
if (!user) throw new Error('未登录');

document.getElementById('sidebar-avatar').textContent = user.avatar || '?';
document.getElementById('sidebar-name').textContent = user.name;
document.getElementById('greeting').textContent = '👋 欢迎回来，' + user.name;
document.getElementById('today').textContent = getTodayStr();

let showAllTasks = false;

// ===== 渲染所有 =====
function renderDashboard() {
  loadData();

  // 侧边栏项目数
  document.getElementById('proj-badge').textContent = PROJECTS.length;

  // 统计卡片
  const totalTasks = TASKS.length;
  const doneCount = TASKS.filter(t => t.status === 'done').length;
  const inProgressCount = TASKS.filter(t => t.status === 'in_progress').length;
  const todoCount = TASKS.filter(t => t.status === 'todo').length;

  document.getElementById('stat-projects').textContent = PROJECTS.length;
  document.getElementById('stat-done').textContent = doneCount;
  document.getElementById('stat-progress').textContent = inProgressCount;
  document.getElementById('stat-todo').textContent = todoCount;

  // 变化提示
  document.getElementById('stat-projects-change').textContent = PROJECTS.length + ' 个项目中';
  document.getElementById('stat-done-change').textContent = '完成率 ' + (totalTasks ? Math.round(doneCount/totalTasks*100) : 0) + '%';
  document.getElementById('stat-progress-change').textContent = inProgressCount + ' 个进行中';
  document.getElementById('stat-todo-change').textContent = todoCount + ' 个待处理';

  // 紧急任务（本周内截止且未完成）
  const urgentCount = TASKS.filter(t => t.status !== 'done' && t.due).length;
  document.getElementById('urgent-count').textContent = urgentCount;

  renderMyTasks();
  renderRecentProjects();
}

// ===== 我的待办 =====
function renderMyTasks() {
  const myName = user.name;
  // 获取当前用户相关的任务（负责人包含姓或名，或直接匹配）
  const myTasks = TASKS.filter(t =>
    t.status !== 'done' &&
    (t.assignee === user.avatar || t.assignee === user.name.charAt(0))
  );

  const displayTasks = showAllTasks ? myTasks : myTasks.slice(0, 5);
  const taskCount = myTasks.length;

  document.getElementById('toggle-tasks-btn').textContent =
    showAllTasks ? '收起' : '查看全部' + (taskCount > 5 ? ' (' + taskCount + ')' : '');

  if (displayTasks.length === 0) {
    document.getElementById('my-tasks').innerHTML =
      '<div class="empty-state">🎉 暂无待办，可以休息一下</div>';
    return;
  }

  let html = '';
  displayTasks.forEach(t => {
    const proj = PROJECTS.find(p => p.id === t.pid);
    const pClass = 'priority-' + t.priority;
    const checkSymbol = t.status === 'done' ? '✓' : t.status === 'in_progress' ? '◉' : '';
    html += `<div class="task-row">
      <div class="task-check ${t.status}" onclick="event.stopPropagation();handleCycleStatus('${t.id}')">${checkSymbol}</div>
      <div class="task-info" onclick="openTaskDetail('${t.id}')">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">${proj ? proj.name : ''} · 截止 ${t.due || '未设置'} · ${t.assignee}</div>
      </div>
      <span class="priority-tag ${pClass}">${priorityLabel(t.priority)}</span>
    </div>`;
  });
  document.getElementById('my-tasks').innerHTML = html;
}

function toggleAllTasks() {
  showAllTasks = !showAllTasks;
  renderMyTasks();
}

// ===== 状态循环 =====
function handleCycleStatus(taskId) {
  cycleStatus(taskId);
  renderDashboard();
}

// ===== 最近项目 =====
function renderRecentProjects() {
  let html = '';
  PROJECTS.slice(0, 3).forEach(p => {
    const total = p.tasks.done + p.tasks.in_progress + p.tasks.todo;
    html += `<a href="project-detail.html?id=${p.id}" class="task-row">
      <div style="width:32px;height:32px;border-radius:6px;background:${p.color}15;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">📁</div>
      <div class="task-info">
        <div class="task-title">${p.name}</div>
        <div class="task-meta">${total} 个任务 · ${p.progress}% 完成</div>
      </div>
      <div style="width:60px;"><div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%"></div></div></div>
    </a>`;
  });
  if (!html) html = '<div class="empty-state">暂无项目</div>';
  document.getElementById('recent-projects').innerHTML = html;
}

// ===== 任务详情弹窗 =====
function openTaskDetail(taskId) {
  const task = TASKS.find(t => t.id === taskId);
  if (!task) return;
  window.location.href = 'project-detail.html?id=' + task.pid + '&task=' + task.id;
}

// ===== 渲染 =====
renderDashboard();
</script>

</body>
</html>
