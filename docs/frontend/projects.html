<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目列表 · 晴天</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #4F46E5; --primary-light: #EEF2FF; --success: #059669; --warning: #D97706; --danger: #DC2626;
  --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB; --gray-300: #D1D5DB;
  --gray-400: #9CA3AF; --gray-500: #6B7280; --gray-600: #4B5563; --gray-700: #374151;
  --gray-800: #1F2937; --gray-900: #111827;
  --radius: 8px; --radius-lg: 12px; --sidebar-w: 220px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--gray-50); color: var(--gray-800); line-height: 1.6; display: flex; min-height: 100vh; }
a { text-decoration: none; }

/* Sidebar */
.sidebar { width: var(--sidebar-w); background: #fff; border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
.sidebar-brand { padding: 20px 20px 16px; font-size: 20px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--gray-100); }
.sidebar-brand .icon { width: 32px; height: 32px; background: var(--primary); color: #fff; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 16px; }
.sidebar-nav { flex: 1; padding: 12px 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); font-size: 14px; color: var(--gray-600); cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: all 0.15s; }
.nav-item:hover { background: var(--gray-50); color: var(--gray-900); }
.nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
.nav-item .badge { margin-left: auto; background: var(--primary); color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
.sidebar-footer { padding: 12px; border-top: 1px solid var(--gray-100); }
.user-info { display: flex; align-items: center; gap: 10px; padding: 8px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
.user-name { font-size: 14px; font-weight: 500; }
.user-role { font-size: 12px; color: var(--gray-400); }
.btn-logout { font-size: 11px; color: var(--gray-400); border: none; background: none; cursor: pointer; }
.btn-logout:hover { color: var(--danger); }

/* Main */
.main { margin-left: var(--sidebar-w); flex: 1; padding: 24px 32px; }
.page-header { margin-bottom: 24px; display: flex; align-items: flex-start; justify-content: space-between; }
.page-header h2 { font-size: 24px; font-weight: 700; }
.page-header p { color: var(--gray-500); font-size: 14px; margin-top: 4px; }

/* Search bar */
.search-bar { display: flex; gap: 8px; margin-bottom: 20px; }
.search-bar input { flex: 1; padding: 10px 14px; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 14px; outline: none; font-family: inherit; }
.search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

/* Project Grid */
.projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.project-card { background: #fff; border-radius: var(--radius-lg); padding: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid var(--gray-100); display: block; color: inherit; transition: all 0.2s; position: relative; }
.project-card:hover { box-shadow: 0 4px 6px rgba(0,0,0,0.07); border-color: var(--primary); }
.project-card .proj-icon { width: 44px; height: 44px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 16px; }
.project-card h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: var(--gray-800); padding-right: 60px; }
.project-card .proj-desc { font-size: 13px; color: var(--gray-500); margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.project-card .proj-progress { margin-bottom: 12px; }
.progress-bar { height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 3px; }
.project-card .proj-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--gray-400); }
.avatar-stack { display: flex; }
.avatar-stack .av { width: 26px; height: 26px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; margin-left: -6px; border: 2px solid #fff; }
.avatar-stack .av:first-child { margin-left: 0; }

/* Project card actions */
.proj-actions { position: absolute; top: 16px; right: 16px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
.project-card:hover .proj-actions { opacity: 1; }
.proj-actions button { width: 28px; height: 28px; border-radius: 6px; border: none; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; color: var(--gray-500); transition: all 0.15s; }
.proj-actions .edit-btn:hover { background: var(--primary-light); color: var(--primary); }
.proj-actions .del-btn:hover { background: #FEE2E2; color: var(--danger); }

.btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; border: 1px solid var(--gray-300); background: #fff; color: var(--gray-700); cursor: pointer; transition: all 0.2s; font-family: inherit; }
.btn:hover { background: var(--gray-50); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: #4338CA; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: #fff; border-radius: var(--radius-lg); width: 520px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 18px; font-weight: 600; }
.modal-close { width: 32px; height: 32px; border-radius: var(--radius); border: none; background: var(--gray-100); font-size: 18px; display: flex; align-items: center; justify-content: center; color: var(--gray-500); cursor: pointer; }
.modal-close:hover { background: var(--gray-200); }
.modal-body { padding: 24px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--gray-700); }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 14px; font-family: inherit; outline: none; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

.color-options { display: flex; gap: 8px; }
.color-options .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all 0.15s; }
.color-options .color-btn:hover { transform: scale(1.15); }
.color-options .color-btn.active { border-color: var(--gray-800); transform: scale(1.15); }

.empty-state { text-align: center; padding: 60px 20px; grid-column: 1 / -1; }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--gray-500); }
.empty-state p { font-size: 14px; color: var(--gray-400); }

@media (max-width: 1024px) { .projects-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .projects-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <a href="dashboard.html" class="sidebar-brand" style="text-decoration:none;color:var(--primary);">
    <div class="icon">☀️</div>晴天
  </a>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item">📊 仪表盘</a>
    <a href="projects.html" class="nav-item active">📁 项目 <span class="badge" id="proj-badge">0</span></a>
    <a href="team-board.html" class="nav-item">👥 团队工作 <span class="badge" id="team-badge">6</span></a>
    <a href="team-resource.html" class="nav-item">📊 资源分配</a>
    <span class="nav-item" onclick="alert('原型占位：日历视图')">📅 日历</span>
    <span class="nav-item" onclick="alert('原型占位：报表页面')">📈 报表</span>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="avatar" id="sidebar-avatar">?</div>
      <div>
        <div class="user-name" id="sidebar-name">加载中...</div>
        <div class="user-role">产品负责人</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()" style="margin:8px 0 0 8px;">退出登录</button>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="page-header">
    <div>
      <h2>📁 所有项目</h2>
      <p>管理和追踪团队项目的进度</p>
    </div>
    <div>
      <a href="dashboard.html" class="btn" style="margin-right:8px;">← 返回仪表盘</a>
      <button class="btn btn-primary" onclick="openCreateProjectModal()">+ 新建项目</button>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="搜索项目名称或描述..." oninput="renderProjects()">
  </div>

  <div class="projects-grid" id="projects-list"></div>
</main>

<!-- Create/Edit Project Modal -->
<div class="modal-overlay" id="project-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="project-modal-title">新建项目</h3>
      <button class="modal-close" onclick="closeProjectModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>项目名称 *</label>
        <input type="text" id="proj-name-input" placeholder="请输入项目名称" maxlength="50">
      </div>
      <div class="form-group">
        <label>项目描述</label>
        <textarea id="proj-desc-input" placeholder="请输入项目描述" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>主题色</label>
        <div class="color-options" id="color-options">
          <div class="color-btn active" style="background:#4F46E5;" data-color="#4F46E5" onclick="selectColor(this)"></div>
          <div class="color-btn" style="background:#059669;" data-color="#059669" onclick="selectColor(this)"></div>
          <div class="color-btn" style="background:#D97706;" data-color="#D97706" onclick="selectColor(this)"></div>
          <div class="color-btn" style="background:#DC2626;" data-color="#DC2626" onclick="selectColor(this)"></div>
          <div class="color-btn" style="background:#7C3AED;" data-color="#7C3AED" onclick="selectColor(this)"></div>
          <div class="color-btn" style="background:#0891B2;" data-color="#0891B2" onclick="selectColor(this)"></div>
          <div class="color-btn" style="background:#BE185D;" data-color="#BE185D" onclick="selectColor(this)"></div>
          <div class="color-btn" style="background:#65A30D;" data-color="#65A30D" onclick="selectColor(this)"></div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="closeProjectModal()">取消</button>
        <button class="btn btn-primary" id="proj-save-btn" onclick="saveProject()">创建项目</button>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script>
var user = requireLogin();
if (!user) throw new Error('未登录');

var editingProjectId = null;
var selectedColor = '#4F46E5';

document.getElementById('sidebar-avatar').textContent = user.avatar || '?';
document.getElementById('sidebar-name').textContent = user.name;

// ===== 渲染项目列表 =====
async function renderProjects() {
  var keyword = document.getElementById('search-input').value;
  try {
    var list = await fetchProjects(keyword);
    document.getElementById('proj-badge').textContent = list.length;

    var html = '';
    list.forEach(function (p) {
      var total = p.task_count || 0;
      html += '<div class="project-card" style="position:relative;">' +
        '<div class="proj-actions">' +
          '<button class="edit-btn" title="编辑" onclick="event.stopPropagation();openEditProjectModal(\'' + p.id + '\')">✏️</button>' +
          '<button class="del-btn" title="删除" onclick="event.stopPropagation();handleDeleteProject(\'' + p.id + '\',\'' + p.name.replace(/'/g, "\\'") + '\')">🗑️</button>' +
        '</div>' +
        '<a href="project-detail.html?id=' + p.id + '" style="display:block;color:inherit;text-decoration:none;">' +
          '<div class="proj-icon" style="background:' + p.color + '15; color:' + p.color + ';">📁</div>' +
          '<h4>' + p.name + '</h4>' +
          '<p class="proj-desc">' + (p.description || '暂无描述') + '</p>' +
          '<div class="proj-progress">' +
            '<div class="progress-bar"><div class="progress-fill" style="width:' + p.progress + '%;background:' + p.color + ';"></div></div>' +
          '</div>' +
          '<div class="proj-meta">' +
            '<span>' + total + ' 个任务 · ' + p.progress + '%</span>' +
          '</div>' +
        '</a>' +
      '</div>';
    });
    if (!html) {
      html = '<div class="empty-state"><div class="empty-icon">🔍</div><h3>未找到项目</h3><p>' +
        (keyword ? '试试其他关键词？' : '还没有项目，点击右上角新建') + '</p></div>';
    }
    document.getElementById('projects-list').innerHTML = html;
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ===== 新建项目弹窗 =====
function openCreateProjectModal() {
  editingProjectId = null;
  selectedColor = '#4F46E5';
  document.getElementById('project-modal-title').textContent = '新建项目';
  document.getElementById('proj-save-btn').textContent = '创建项目';
  document.getElementById('proj-name-input').value = '';
  document.getElementById('proj-desc-input').value = '';
  resetColorSelection('#4F46E5');
  document.getElementById('project-modal').classList.add('active');
}

// ===== 编辑项目弹窗 =====
async function openEditProjectModal(projectId) {
  try {
    var proj = await fetchProject(projectId);
    editingProjectId = projectId;
    selectedColor = proj.color || '#4F46E5';
    document.getElementById('project-modal-title').textContent = '编辑项目';
    document.getElementById('proj-save-btn').textContent = '保存修改';
    document.getElementById('proj-name-input').value = proj.name;
    document.getElementById('proj-desc-input').value = proj.description || '';
    resetColorSelection(selectedColor);
    document.getElementById('project-modal').classList.add('active');
  } catch (err) {
    showToast(err.message, 'error');
  }
}

function closeProjectModal() {
  document.getElementById('project-modal').classList.remove('active');
  editingProjectId = null;
}

function selectColor(el) {
  document.querySelectorAll('.color-btn').forEach(function (b) { b.classList.remove('active'); });
  el.classList.add('active');
  selectedColor = el.dataset.color;
}

function resetColorSelection(color) {
  document.querySelectorAll('.color-btn').forEach(function (b) {
    b.classList.toggle('active', b.dataset.color === color);
  });
}

async function saveProject() {
  var name = document.getElementById('proj-name-input').value.trim();
  if (!name) { showToast('请输入项目名称', 'warning'); return; }
  var desc = document.getElementById('proj-desc-input').value.trim();

  try {
    if (editingProjectId) {
      await updateProjectById(editingProjectId, { desc: desc, color: selectedColor, name: name });
    } else {
      await createProject(name, desc, selectedColor);
    }
    closeProjectModal();
    renderProjects();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ===== 删除项目 =====
function handleDeleteProject(projectId, projectName) {
  showConfirm('确定要删除项目「' + projectName + '」吗？\\n该项目下的所有任务和评论也将被删除。', async function () {
    try {
      await deleteProjectById(projectId);
      renderProjects();
    } catch (err) {
      showToast(err.message, 'error');
    }
  });
}

// ===== 点击遮罩关闭弹窗 =====
document.getElementById('project-modal').addEventListener('click', function (e) {
  if (e.target === this) closeProjectModal();
});

// ===== 初始化 =====
renderProjects();
</script>

</body>
</html>
