<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 晴天</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
.login-card {
  background: #fff; border-radius: 12px; padding: 48px 40px; width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.login-card h1 { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 4px; }
.login-card .subtitle { text-align: center; color: #9CA3AF; margin-bottom: 32px; font-size: 14px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #374151; }
.form-group input {
  width: 100%; padding: 10px 14px; border: 1px solid #D1D5DB; border-radius: 8px;
  font-size: 15px; transition: border-color 0.2s;
}
.form-group input:focus { outline: none; border-color: #4F46E5; box-shadow: 0 0 0 3px #EEF2FF; }
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 12px; border-radius: 8px; font-size: 16px; font-weight: 500;
  border: none; cursor: pointer; width: 100%;
  background: #4F46E5; color: #fff; transition: background 0.2s;
}
.btn:hover { background: #4338CA; }
.hint { text-align: center; margin-top: 16px; font-size: 13px; color: #9CA3AF; }
</style>
</head>
<body>
<div class="login-card">
  <h1>☀️ 晴天</h1>
  <p class="subtitle">轻量级项目协作，让团队工作更清爽</p>
  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="email" placeholder="you@company.com" value="demo@qingtian.com" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="••••••••" value="123456" required>
    </div>
    <button type="submit" class="btn">登 录</button>
  </form>
  <p class="hint">点击登录进入仪表盘 →</p>
</div>

<script>
function doLogin(e) {
  e.preventDefault();
  localStorage.setItem('qingtian_user', JSON.stringify({
    name: '童七七',
    role: '产品负责人',
    avatar: '七',
    email: document.getElementById('email').value
  }));
  window.location.href = 'dashboard.html';
}

// 已登录则直接跳转
if (localStorage.getItem('qingtian_user')) {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
